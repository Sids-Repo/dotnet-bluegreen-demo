version: 0.2

phases:
  install:
    runtime-versions:
      dotnet: 6.0
    commands:
      - echo "Installing dependencies..."
      
  pre_build:
    commands:
      - echo "Restoring packages..."
      - dotnet restore
      
  build:
    commands:
      - echo "Building application..."
      - dotnet publish -c Release -o ./publish
      
artifacts:
  files:
    - '**/*'
  base-directory: ./publish
